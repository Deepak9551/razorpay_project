spring:
  application:
    name: razorpay
# DATASOURCE
  datasource:
    url: ${DB_DATABASE:jdbc:postgresql://localhost:5432/my_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
# JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true